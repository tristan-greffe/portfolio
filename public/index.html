<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg">
    <link rel="alternate icon" type="image/png" href="%PUBLIC_URL%/favicon.png">
    <meta name="description" content="Tristan Greffe — Développeur web et ingénieur DevOps basé à Toulouse">
    <meta name="theme-color" content="#064e3b">
    <title>Tristan Greffe | Portfolio</title>
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          })
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0] + (decoded[1] ? '&' + decoded[1] : '') + l.hash
          )
        }
      }(window.location))
    </script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
